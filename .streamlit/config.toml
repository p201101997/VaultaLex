## Step 4 — Upload Root Level Files

1. Go back to the **main repo page** (click the repo name at the top)
2. Click **"Add file"** → **"Upload files"**
3. Drag and drop OR click **"choose your files"** and select these files **all at once:**
   - `app.py`
   - `requirements.txt`
   - `README.md` *(it will replace the one auto-created)*
4. At the bottom, click **"Commit changes"**

---

## Step 5 — Upload the `.gitignore` File

> ⚠️ Your file is named `_gitignore` — you must rename it to `.gitignore` on your computer first before uploading.

**How to rename on Windows:**
- Right click the file → Rename → type `.gitignore` → press Enter → click Yes

**How to rename on Mac:**
- Click the file once → press Enter → type `.gitignore` → press Enter

Then:
1. In your repo, click **"Add file"** → **"Upload files"**
2. Upload the renamed `.gitignore` file
3. Click **"Commit changes"**

---

## Step 6 — Upload Logo to `assets` Folder

1. Click into the **`assets`** folder in your repo
2. Click **"Add file"** → **"Upload files"**
3. Upload `vaultalex_logo.png`
4. Click **"Commit changes"**

