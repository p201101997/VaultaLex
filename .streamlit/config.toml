### Create the `data` folder

1. Click **"Add file"** → **"Create new file"**
2. In the filename box type:
```
   data/.gitkeep
```
3. Click **"Commit changes"** → **"Commit directly to main"** → **"Commit changes"**

### Create the `reports` folder

1. Click **"Add file"** → **"Create new file"**
2. In the filename box type:
```
   reports/.gitkeep
```
3. Click **"Commit changes"** → **"Commit directly to main"** → **"Commit changes"**

